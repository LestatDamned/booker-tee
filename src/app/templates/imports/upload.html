{% extends "base.html" %}

{% block title %}Загрузка · {{ app_name }}{% endblock %}

{% block content %}
  <section class="panel stack">
    <div>
      <p class="eyebrow">{{ workspace.name }}</p>
      <h1>Загрузить выписку</h1>
    </div>

    {% if error %}
      <div class="notice error">{{ error }}</div>
    {% endif %}

    <form class="stack" method="post" action="/imports/upload" enctype="multipart/form-data">
      <div class="field">
        <label for="account_id">Счет</label>
        <select id="account_id" name="account_id">
          {% for account in accounts %}
            <option value="{{ account.id }}">{{ account.name }} · {{ account.currency }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="field">
        <label for="statement_pdf">PDF-выписка</label>
        <input id="statement_pdf" name="statement_pdf" type="file" accept="application/pdf,.pdf" required>
      </div>

      <button class="button" type="submit">извлечь данные</button>
    </form>
  </section>
{% endblock %}
