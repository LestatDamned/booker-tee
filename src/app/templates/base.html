<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}{{ app_name }}{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='/css/app.css') }}">
    <script defer src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script defer src="https://unpkg.com/alpinejs@3.14.8/dist/cdn.min.js"></script>
  </head>
  <body>
    <header class="shell site-header">
      <a class="brand" href="/">{{ app_name }}</a>
      <nav class="nav-actions">
        <a class="nav-link" href="/accounts">счета</a>
        <a class="nav-link" href="/ledger/manual">операции</a>
        <a class="nav-link" href="/imports">импорт</a>
        <a class="nav-link" href="/rules">правила</a>
        <a class="nav-link" href="/reports">отчеты</a>
        <a class="nav-link" href="/properties">объекты</a>
        <a class="status-pill" href="/imports/upload">загрузить</a>
      </nav>
    </header>
    <main class="shell page-frame">
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
