{% macro transfer_form(document, row, accounts, suggestions) %}
  <form
    class="transfer-form"
    method="post"
    action="/imports/documents/{{ document.id }}/raw-transactions/{{ row.id }}/status"
    x-data="{ selectedAccount: '', matchedRow: '' }"
  >
    {{ csrf_input() }}
    <input type="hidden" name="action" value="transfer">
    <div class="transfer-fields">
      <label class="field">
        <span>Счет перевода</span>
        <select
          name="counterparty_account_id"
          aria-label="Счет перевода"
          x-model="selectedAccount"
          @change="matchedRow = ''"
        >
          <option value="">выбери счет</option>
          {% for account in accounts %}
            <option value="{{ account.id }}">{{ account.name }}</option>
          {% endfor %}
        </select>
      </label>
      <label class="field">
        <span>Парная строка</span>
        <select
          name="matched_raw_transaction_id"
          aria-label="Парная строка перевода"
          x-model="matchedRow"
        >
          <option value="">без парной строки</option>
          {% for suggestion in suggestions %}
            {% set candidate = suggestion.raw_transaction %}
            <option
              value="{{ candidate.id }}"
              data-account-id="{{ candidate.account_id }}"
              x-show="!selectedAccount || selectedAccount === '{{ candidate.account_id }}'"
              x-bind:hidden="selectedAccount && selectedAccount !== '{{ candidate.account_id }}'"
              x-bind:disabled="selectedAccount && selectedAccount !== '{{ candidate.account_id }}'"
            >
              {{ (candidate.operation_date or candidate.operation_date_raw) | date_ru }} · {{ candidate.amount }} {{ candidate.currency or "" }} · {{ candidate.account.name if candidate.account else "счет не найден" }} · строка {{ candidate.row_index }} · {{ suggestion.day_distance }} дн. · {{ candidate.description_normalized or candidate.description_raw or "" }}
            </option>
          {% endfor %}
        </select>
      </label>
    </div>
    <div class="transfer-help">
      <span>Если парной строки нет, будет создан ручной перевод на выбранный счет.</span>
    </div>
    <button class="button button-small" type="submit">{{ icon("refresh") }} Это перевод</button>
  </form>
{% endmacro %}
