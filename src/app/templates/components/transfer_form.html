{% macro transfer_form(document, row, accounts, suggestions, existing_suggestions=[]) %}
  <form
    class="transfer-form"
    method="post"
    action="/imports/documents/{{ document.id }}/raw-transactions/{{ row.id }}/status"
    x-data="{ selectedAccount: '', transferMatch: 'new' }"
  >
    {{ csrf_input() }}
    <input type="hidden" name="action" value="transfer">
    <input
      type="hidden"
      name="matched_raw_transaction_id"
      :value="transferMatch.startsWith('raw:') ? transferMatch.slice(4) : ''"
    >
    <input
      type="hidden"
      name="matched_operation_id"
      :value="transferMatch.startsWith('operation:') ? transferMatch.slice(10) : ''"
    >
    <div class="transfer-fields">
      <label class="field">
        <span>Счет перевода</span>
        <select
          name="counterparty_account_id"
          aria-label="Счет перевода"
          x-model="selectedAccount"
          @change="transferMatch = 'new'"
        >
          <option value="">выбери счет</option>
          {% for account in accounts %}
            <option value="{{ account.id }}">{{ account.name }}</option>
          {% endfor %}
        </select>
      </label>
      <label class="field">
        <span>Связать с</span>
        <select
          aria-label="Связать перевод"
          x-model="transferMatch"
        >
          <option value="new">создать новый перевод на выбранный счет</option>
          {% for suggestion in suggestions %}
            {% set candidate = suggestion.raw_transaction %}
            <option
              value="raw:{{ candidate.id }}"
              data-account-id="{{ candidate.account_id }}"
              x-show="!selectedAccount || selectedAccount === '{{ candidate.account_id }}'"
              x-bind:hidden="selectedAccount && selectedAccount !== '{{ candidate.account_id }}'"
              x-bind:disabled="selectedAccount && selectedAccount !== '{{ candidate.account_id }}'"
            >
              строка выписки · {{ (candidate.operation_date or candidate.operation_date_raw) | date_ru }} · {{ candidate.amount }} {{ candidate.currency or "" }} · {{ candidate.account.name if candidate.account else "счет не найден" }} · строка {{ candidate.row_index }} · {{ suggestion.day_distance }} дн. · {{ candidate.description_normalized or candidate.description_raw or "" }}
            </option>
          {% endfor %}
          {% for suggestion in existing_suggestions %}
            {% set operation = suggestion.operation %}
            {% set counterparty = suggestion.counterparty_entry %}
            <option
              value="operation:{{ operation.id }}"
              data-account-id="{{ counterparty.account_id if counterparty else '' }}"
              x-show="!selectedAccount || selectedAccount === '{{ counterparty.account_id if counterparty else '' }}'"
              x-bind:hidden="selectedAccount && selectedAccount !== '{{ counterparty.account_id if counterparty else '' }}'"
              x-bind:disabled="selectedAccount && selectedAccount !== '{{ counterparty.account_id if counterparty else '' }}'"
            >
              созданный перевод · {{ operation.operation_date | date_ru }} · {{ suggestion.account_entry.amount }} {{ suggestion.account_entry.currency }} · {{ counterparty.account.name if counterparty and counterparty.account else "счет не найден" }} · {{ suggestion.day_distance }} дн. · {{ operation.description or "ручной перевод" }}
            </option>
          {% endfor %}
        </select>
      </label>
    </div>
    <div class="transfer-help">
      <span>Можно связать со строкой другой выписки, с уже созданным ручным переводом или создать новый перевод на выбранный счет.</span>
    </div>
    <button class="button button-small" type="submit">{{ icon("refresh") }} Это перевод</button>
  </form>
{% endmacro %}
