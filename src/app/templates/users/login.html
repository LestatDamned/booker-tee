{% extends "base.html" %}

{% block title %}Вход · {{ app_name }}{% endblock %}

{% block content %}
  <section class="panel stack">
    <div class="toolbar">
      <div>
        <p class="eyebrow">доступ</p>
        <h1>Вход</h1>
      </div>
      <a class="button" href="/signup">{{ icon("user") }} регистрация</a>
    </div>

    {% if error %}
      <div class="notice error">{{ error }}</div>
    {% endif %}

    <form class="form-panel" method="post" action="/login">
      <label class="field form-field-half">
        <span>email</span>
        <input name="email" type="email" autocomplete="email" required>
      </label>
      <label class="field form-field-half">
        <span>пароль</span>
        <input name="password" type="password" autocomplete="current-password" required>
      </label>
      <div class="form-actions">
        <button class="button" type="submit">{{ icon("check") }} войти</button>
      </div>
    </form>
  </section>
{% endblock %}
