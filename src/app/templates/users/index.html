{% extends "base.html" %}

{% block title %}Профиль · {{ app_name }}{% endblock %}

{% block content %}
  <section class="panel stack">
    <div class="toolbar">
      <div>
        <p class="eyebrow">{{ workspace.name }}</p>
        <h1>Профиль</h1>
      </div>
      <a class="button" href="/workspaces">{{ icon("folder") }} пространства</a>
    </div>

    <div class="summary-grid">
      <div class="metric">
        <span>email</span>
        <strong class="truncate-label" title="{{ current_user.email }}">{{ current_user.email }}</strong>
      </div>
      <div class="metric">
        <span>имя</span>
        <strong class="truncate-label" title="{{ current_user.name or 'не указано' }}">{{ current_user.name or "не указано" }}</strong>
      </div>
    </div>

    <form class="session-actions" method="post" action="/logout">
      {{ csrf_input() }}
      <span>Сессия</span>
      <button class="button button-small" type="submit">{{ icon("ignore") }} выйти</button>
    </form>
  </section>
{% endblock %}
